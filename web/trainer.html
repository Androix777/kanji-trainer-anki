<div class="kt-container">
    <div class="kt-canvas-area">
        <div class="kt-draw-stage">
            <canvas id="paintCanvas"></canvas>
            <div id="stroke-counter" class="kt-counter">0</div>
        </div>
        <div id="resultPanel"></div>
    </div>
    <div id="drawing-bar" class="kt-button-bar">
        <button id="btn-undo" type="button" class="k-btn">Undo</button>
        <button id="btn-clear" type="button" class="k-btn">Clear</button>
        <button id="btn-hint" type="button" class="k-btn">Hint</button>
        <button id="btn-check" type="button" class="k-btn k-primary" disabled>Check</button>
    </div>
    <div id="rating-bar" class="kt-button-bar" style="display: none;">
        <button id="btn-rate-clear" type="button" class="k-btn">Clear</button>
        <button id="btn-rate-again" type="button" class="k-btn k-again">Again</button>
        <button id="btn-rate-hard" type="button" class="k-btn k-hard">Hard</button>
        <button id="btn-rate-good" type="button" class="k-btn k-good">Good</button>
        <button id="btn-rate-easy" type="button" class="k-btn k-easy">Easy</button>
    </div>
</div>
